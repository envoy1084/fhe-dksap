[advisories]
yanked = "deny"
ignore = [
  { id = "RUSTSEC-2025-0141", reason = "bincode 1.3.3 is transitive through TFHE-rs 1.6.3; this crate does not expose bincode as a wire format" },
  { id = "RUSTSEC-2024-0436", reason = "paste 1.0.15 is transitive through TFHE-rs 1.6.3 and pulp; no downstream replacement is available" },
]

[licenses]
confidence-threshold = 0.8
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause-Clear",
  "CC0-1.0",
  "MIT",
  "MIT-0",
  "Unicode-3.0",
  "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
